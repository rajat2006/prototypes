services:
  redis:
    image: redis:7-alpine
    ports:
      - 6379:6379
    networks:
      - lobby-net
  game-server-1:
    build: ./game-server
    ports:
      - 5001:5000
    environment:
      - SERVER_ID=server-1
      - PORT=5000
      - REDIS_URL=redis://redis:6379
    networks:
      - lobby-net
    depends_on:
      - redis

  game-server-2:
    build: ./game-server
    ports:
      - 5002:5000
    environment:
      - SERVER_ID=server-2
      - PORT=5000
      - REDIS_URL=redis://redis:6379
    networks:
      - lobby-net
    depends_on:
      - redis

  router:
    build:
      context: .
      dockerfile: router/Dockerfile
    ports:
      - 4000:4000
    networks:
      - lobby-net
    depends_on:
      - game-server-1
      - game-server-2

networks:
  lobby-net:
    driver: bridge
