# Spawn one worker process per CPU core. Workers handle the actual connections;
# the master process just reads config and binds ports.
worker_processes auto;

# Required block. Each worker can hold up to N simultaneous connections.
# With WebSockets, every connected player counts as one connection.
events {
  worker_connections 1024;
}

# Top-level container for all HTTP/WebSocket-related config.
http {
  # Map file extensions to Content-Type headers (e.g., .css -> text/css).
  # Without this, browsers may refuse to execute our JS.
  include mime.types;
  default_type application/octet-stream;

  # Use the kernel's sendfile() syscall for zero-copy static file serving.
  sendfile on;

  # Pool of backend game servers. Default load-balancing strategy is round-robin.
  # Service names (game-server-1, game-server-2) resolve via Docker's internal DNS
  # within the lobby-net network.
  upstream game_servers {
    server game-server-1:5000;
    server game-server-2:5000;
  }

  # Public-facing virtual host on port 4000 — the single entry point for clients.
  server {
    listen 4000;
    server_name _;  # match any hostname (we don't care; this is internal)

    # Serve the player UI (HTML/CSS/JS) from disk.
    # Files were copied to this path by the Dockerfile from ./client/
    location / {
      root /usr/local/openresty/nginx/html;
      index index.html;
    }

    # WebSocket endpoint — proxies upgrade requests to the game-server pool.
    location /ws {
      proxy_pass http://game_servers;

      # WebSocket requires HTTP/1.1 (HTTP/1.0 doesn't support persistent connections).
      proxy_http_version 1.1;

      # The two magic headers that turn a regular proxy into a WS-aware one.
      # Without these, the upgrade handshake fails silently.
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";

      # Forward original Host header so the backend sees the real hostname.
      proxy_set_header Host $host;

      # WebSockets can be idle for a long time between messages. Default 60s
      # would disconnect inactive players mid-game; bump to 1 hour.
      proxy_read_timeout 3600s;
    }
  }
}
